syntax = "proto3";

package ezrah.credential.v1;

// CredentialPipeline is the only public surface of this service. There is no
// HTTP server: upstream services talk to the pipeline exclusively over gRPC.
service CredentialPipeline {
  // Submit accepts a credential request and returns immediately. Processing is
  // asynchronous; the ack only confirms the request was durably queued.
  // Submitting the same request again (same idempotency key) is safe and returns
  // the id of the already-accepted request.
  rpc Submit(SubmitRequest) returns (SubmitAck);

  // Watch streams the full event history of a request (replayed from the event
  // log) followed by live events as they happen. The stream completes when the
  // request reaches a terminal state. A caller can reconstruct the entire state
  // of a request from this stream alone.
  rpc Watch(WatchRequest) returns (stream PipelineEvent);

  // GetStatus returns a point-in-time snapshot. Useful for pollers and health
  // checks that do not want a long-lived stream.
  rpc GetStatus(GetStatusRequest) returns (RequestStatus);

  // Retry re-drives a FAILED request from its first incomplete step. Steps that
  // already succeeded are never re-run.
  rpc Retry(RetryRequest) returns (RetryAck);
}

message SubmitRequest {
  string subject_did = 1;                 // e.g. did:polygon:0xabc123...
  string credential_type = 2;             // EmploymentCredential | IdentityCredential | KYCCredential
  map<string, string> claims = 3;         // key-value claims payload
  optional string callback_url = 4;       // POSTed with the final outcome if present
  optional string idempotency_key = 5;    // caller-supplied dedup key; derived from content if omitted
}

message SubmitAck {
  string request_id = 1;
  string status = 2;      // ACCEPTED, or the existing status when duplicate=true
  bool duplicate = 3;     // true when this matched an already-accepted request
  string message = 4;
}

message WatchRequest {
  string request_id = 1;
  uint64 from_sequence = 2; // resume from a sequence number (0 = from the beginning)
}

message GetStatusRequest {
  string request_id = 1;
}

message RetryRequest {
  string request_id = 1;
}

message RetryAck {
  string request_id = 1;
  string status = 2;
  string resumed_step = 3; // the step the pipeline resumed at, or empty
  string message = 4;
}

// A single pipeline event. `data_json` carries the type-specific payload
// (the signed credential, the failure reason, step timings, etc.) as JSON so
// the envelope stays stable while payloads evolve.
message PipelineEvent {
  string event_id = 1;
  string request_id = 2;
  uint64 sequence = 3;    // monotonic per request; gaps mean missed events
  string type = 4;        // REQUEST_ACCEPTED | STEP_STARTED | STEP_SUCCEEDED | STEP_FAILED | REQUEST_COMPLETED | REQUEST_FAILED
  string step = 5;        // IDENTITY_VERIFICATION | CLAIMS_VALIDATION | CREDENTIAL_SIGNING | ""
  string status = 6;
  string occurred_at = 7; // ISO-8601 UTC
  string data_json = 8;   // JSON-encoded event payload
}

message StepView {
  string step = 1;
  string state = 2;       // PENDING | RUNNING | SUCCEEDED | FAILED
  uint32 attempts = 3;
  string error = 4;
  string started_at = 5;
  string finished_at = 6;
}

message RequestStatus {
  string request_id = 1;
  string subject_did = 2;
  string credential_type = 3;
  string status = 4;                 // ACCEPTED | PROCESSING | COMPLETED | FAILED
  string current_step = 5;
  repeated StepView steps = 6;
  string signed_credential_json = 7; // present when COMPLETED
  string failure_step = 8;           // present when FAILED
  string failure_reason = 9;         // present when FAILED
  uint64 last_sequence = 10;
  string created_at = 11;
  string updated_at = 12;
}
